events { worker_connections 1024; }

http {
  upstream api  { server api:8080; }
  upstream push { server push:8084; }
  upstream web  { server web:3000; }

  server {
    listen 80;

    location /api/      { proxy_pass http://api; }
    location /engine/   { proxy_pass http://api; }
    location /strategy/ { proxy_pass http://api; }

    location /ws/ {
      proxy_pass http://push;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / { proxy_pass http://web; }
  }
}