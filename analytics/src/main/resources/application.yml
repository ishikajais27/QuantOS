server:
  port: 8083
spring:
  application:
    name: analytics
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:tradingdb}
    username: ${POSTGRES_USER:trader}
    password: ${POSTGRES_PASSWORD:trader_secret_123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
logging:
  level:
    com.trading.analytics: INFO
