services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_net

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_net

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    container_name: engine
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trading_net

  market-data:
    build:
      context: .
      dockerfile: market-data/Dockerfile
    container_name: market-data
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading_net

  analytics:
    build:
      context: .
      dockerfile: analytics/Dockerfile
    container_name: analytics
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trading_net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      ENGINE_URL: ${ENGINE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      engine:
        condition: service_started
    networks:
      - trading_net

  push:
    build:
      context: .
      dockerfile: push/Dockerfile
    container_name: push
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading_net

  strategy:
    build:
      context: .
      dockerfile: strategy/Dockerfile
    container_name: strategy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - trading_net

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      NEXT_PUBLIC_API_URL: ''
      NEXT_PUBLIC_WS_URL: ''
    depends_on:
      - api
      - push
    networks:
      - trading_net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - push
      - frontend
      - engine
    networks:
      - trading_net

volumes:
  postgres_data:
  redis_data:

networks:
  trading_net:
    driver: bridge
