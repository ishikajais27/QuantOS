global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'trading-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'trading-analytics'
    static_configs:
      - targets: ['analytics:8083']
    metrics_path: '/actuator/prometheus'

  - job_name: 'trading-engine'
    static_configs:
      - targets: ['engine:8081']
    metrics_path: '/actuator/prometheus'
