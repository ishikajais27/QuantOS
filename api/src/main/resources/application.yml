server:
  port: 8080
spring:
  application:
    name: trading-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:tradingdb}
    username: ${POSTGRES_USER:trader}
    password: ${POSTGRES_PASSWORD:trader_secret_123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
engine:
  url: ${ENGINE_URL:http://localhost:8081}
jwt:
  secret: ${JWT_SECRET:supersecretjwtkeyfordemopurposesonly1234567890}
  expiry: 86400000
logging:
  level:
    com.trading.api: INFO
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  metrics:
    export:
      prometheus:
        enabled: true
