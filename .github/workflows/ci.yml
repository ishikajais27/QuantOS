name: QuantOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tradingdb_test
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: trader_secret_123
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test all modules
        run: mvn clean verify -pl engine,api,analytics,market-data,push,strategy -am
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: tradingdb_test
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: trader_secret_123
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci_test_secret_not_for_production_use_only_32chars

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for docker compose
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=tradingdb
          POSTGRES_USER=trader
          POSTGRES_PASSWORD=trader_secret_123
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          REDIS_HOST=redis
          REDIS_PORT=6379
          JWT_SECRET=ci_test_secret_not_for_production_use_only_32chars
          ENGINE_URL=http://engine:8081
          EOF

      - name: Build all Docker images
        run: docker compose build

      - name: Smoke test
        run: |
          docker compose up -d postgres redis engine api
          echo "Waiting 30s for services to start..."
          sleep 30
          curl -f http://localhost:8080/actuator/health || exit 1
          docker compose down -v
